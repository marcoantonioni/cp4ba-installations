apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "${CP4BA_INST_CR_NAME}-cp4ba-operator-default-ingress"
  namespace: "${CP4BA_INST_NAMESPACE}"
  labels:
    app.kubernetes.io/component: Operator
    app.kubernetes.io/instance: ${CP4BA_INST_CR_NAME}
    app.kubernetes.io/managed-by: Operator
    app.kubernetes.io/name: ${CP4BA_INST_CR_NAME}-platform-ingress
    app.kubernetes.io/version: ${CP4BA_INST_APPVER}
    release: ${CP4BA_INST_APPVER}

spec:
  podSelector:
    matchLabels:
      name: ibm-cp4a-operator
  ingress:
    - {}
  policyTypes:
    - Ingress
