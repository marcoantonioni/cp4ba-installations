#======================================================================
# Configuration file for cp4ba-installations tool
#
# This configuration install and configure:
#
# Foundation components
# 1 LDAP local to this installation namespace + users IAM onboarding 
# 1 DB Server
# 1 WfPS Authoring
#======================================================================

#----------------------------------------------------------------------
# Main section
#----------------------------------------------------------------------

# This variable defines the type of measurement of licenses consumed by the CR. 
# https://www.ibm.com/docs/en/cloud-paks/cp-biz-automation/25.0.1?topic=administering-managing-your-license-entitlements
# https://www.ibm.com/docs/en/cloud-paks/foundational-services/4.x_cd?topic=license-service
# Allowed values ​​are 'non-production' and 'production'.
export CP4BA_INST_LICENSE_TYPE="non-production"

# description of deployment (will be set in metadata.annotations.kubernetes.io/description)
export CP4BA_INST_DESCRIPTION="Authoring production deployment WfPS (license: ${CP4BA_INST_LICENSE_TYPE})"

# name of CR (as you like)
export CP4BA_INST_CR_NAME="icp4adeploy"
# logical id of the environment (it will be part of installation namespace)
export CP4BA_INST_ENV="wfps-authoring-pfs-prod"
# the name of target namespace, created if not exists
export CP4BA_INST_NAMESPACE="cp4ba-${CP4BA_INST_ENV}"
# do not modify (used for DB names)
export CP4BA_INST_ENV_FOR_DB_PREFIX="${CP4BA_INST_ENV//-/_}"
# deployment type, 'starter' or 'production'
export CP4BA_INST_TYPE="production"
# platform type, 'OCP' or 'ROKS'
export CP4BA_INST_PLATFORM="OCP"

export CP4BA_BASE_VER="25.0.1"

export CP4BA_INST_APPVER="25.0.1"
export CP4BA_INST_IMGTAG="25.0.1"

# values: small, medium, large
export CP4BA_INST_DEPL_PROFILE_SIZE="small"

export CP4BA_AUTO_SEPARATE_OPERATOR="No"
export CP4BA_AUTO_FIPS_CHECK="No" 
export CP4BA_AUTO_AIRGAP_MODE="No"
export CP4BA_AUTO_PRIVATE_CATALOG="Yes" 


# namespace of LDAP and DB supporting components (do not modify for education/demo/test)
export CP4BA_INST_SUPPORT_NAMESPACE="${CP4BA_INST_NAMESPACE}"
# if LDAP/DBs already installed in different namespace (eg: cp4ba-supports-...)
# export CP4BA_INST_SUPPORT_NAMESPACE="cp4ba-supports-${CP4BA_INST_ENV}"

# comma separated list of CP4BA patterns (foundation,workflow,application,decisions,decisions_ads,content,document_processing)
export CP4BA_INST_DEPL_PATTERNS="foundation,workflow-process-service"

# comma separated list of CP4BA optional components (bas,bai,decisionCenter,decisionRunner,decisionServerRuntime,ads_designer,ads_runtime,cmis,css,tm,ier,app_designer,ae_data_persistence,document_processing_designer,baw_authoring,pfs,kafka,workflow_assistant,workplace_assistant)
export CP4BA_INST_OPT_COMPONENTS="wfps_authoring,opensearch"

# storage classes (to check those available on your OCP cluster use: oc get sc)
#export CP4BA_INST_SC_FILE="managed-nfs-storage"
#export CP4BA_INST_SC_BLOCK="managed-nfs-storage"
#export CP4BA_INST_SC_FILE="ocs-storagecluster-cephfs"
#export CP4BA_INST_SC_BLOCK="ocs-storagecluster-ceph-rbd"

export CP4BA_INST_SC_FILE="ocs-external-storagecluster-cephfs"
export CP4BA_INST_SC_BLOCK="ocs-external-storagecluster-ceph-rbd"

# Pak administrator
export CP4BA_INST_PAKBA_ADMIN_USER="cp4admin"
export CP4BA_INST_PAKBA_ADMIN_PWD="dem0s"
export CP4BA_INST_PAKBA_ADMIN_GROUP="AdminsGroup"

# 20260223
export CP4BA_INST_PAKBA_PASSW_LTPA="passw0rd"
export CP4BA_INST_PAKBA_PASSW_KEYSTORE="passw0rd"

# folder of CasePakManager tool scripts 
export CP4BA_INST_CMGR_TOOLS_FOLDER="../../cp4ba-casemanager-setup"

# Folder used to read configuration files (.propertis)
export CP4BA_INST_CONFIG_FOLDER="../configs25.0.1"

# Output folder used to generate configuration files (.yaml, .sql)
export CP4BA_INST_OUTPUT_FOLDER="../output"

# Reference to CR template file used to generate this configuration (must be in 'CP4BA_INST_CONFIG_FOLDER' folder)
export CP4BA_INST_CR_TEMPLATE="templates25.0.1/cp4ba-cr-ref-authoring-wfps.yaml"

#----------------------------------------------------------------------
# ZenService Certificate
#----------------------------------------------------------------------
export CP4BA_INST_UTILS_TOOLS_FOLDER="../../cp4ba-utilities/cp4ba-tls-entry-point/"
export CP4BA_INST_ZS_CONFIGURE=true
# default values valid for IBM Cloud env
export CP4BA_INST_ZS_SOURCE_SECRET="letsencrypt-certs"
export CP4BA_INST_ZS_SOURCE_NAMESPACE="openshift-config"
export CP4BA_INST_ZS_TARGET_SECRET="my-letsencrypt"
# do not modify
export CP4BA_INST_ZS_NAME="iaf-zen-cpdservice"

#----------------------------------------------------------------------
# LDAP & IAM section
#----------------------------------------------------------------------

# LDAP optional, set CP4BA_INST_LDAP to false to use external preconfigured ldap
# if true will install a local LDAP pod along with CP4BA deployment
export CP4BA_INST_LDAP=true
# folder of LDAP tool scripts
export CP4BA_INST_LDAP_TOOLS_FOLDER="../../cp4ba-idp-ldap/scripts"
# LDAP configuration file
export CP4BA_INST_LDAP_CFG_FILE="${CP4BA_INST_CONFIG_FOLDER}/_cfg-production-ldap-domain.properties"
source "${CP4BA_INST_LDAP_CFG_FILE}"
# do not modify following CP4BA_INST_LDAP_... vars
export CP4BA_INST_LDAP_HOST="${LDAP_HOST}"
export CP4BA_INST_LDAP_PORT="${LDAP_PORT}"
export CP4BA_INST_LDAP_SECRET="ldap-bind-${CP4BA_INST_ENV}"
export CP4BA_INST_LDAP_BASE_DOMAIN="${LDAP_FULL_DOMAIN}"
export CP4BA_INST_LDAP_ADMIN_USER="cn=admin,${CP4BA_INST_LDAP_BASE_DOMAIN}"


# IAM optional, set CP4BA_INST_IAM to false to avoid user onboarding in pak or when CP4BA_INST_LDAP=false
# if true will onboard users from LDAP
export CP4BA_INST_IAM=true
# folder of IAM tool scripts
export CP4BA_INST_IDP_TOOLS_FOLDER="../../cp4ba-idp-ldap/scripts"
# IDP configuration file
export CP4BA_INST_IDP_CFG_FILE="${CP4BA_INST_CONFIG_FOLDER}/_cfg-production-idp.properties"
# do not modify following CP4BA_INST_IAM_... vars
export CP4BA_INST_IAM_ADMIN_USER="cpadmin"
export CP4BA_INST_IAM_ADMIN_GROUP="AdminsGroup"

# 20260224 CPFS change in console route name 
export CP4BA_INST_CPD_CONSOLE_PREFIX="cpd-${CP4BA_INST_NAMESPACE}.apps"
export CP4BA_INST_CPD_CONSOLE_FQDN_SUFFIX="automatically-update-by-scripts..."


#----------------------------------------------------------------------
# DB section
#----------------------------------------------------------------------

# DB optional, set CP4BA_INST_DB to false to use external preconfigured db server
# if true will install a local Postgres DB pod along with CP4BA deployment
export CP4BA_INST_DB=true
export CP4BA_INST_DB_OWNER="postgres"
export CP4BA_INST_DB_NAMESPACE="${CP4BA_INST_SUPPORT_NAMESPACE}"
export CP4BA_INST_DB_SERVER_PORT="5432"
export CP4BA_INST_DB_SERVER_TYPE="postgresql"
export CP4BA_INST_DB_FAMILY_PREFIX="${CP4BA_INST_ENV}"
export CP4BA_INST_DB_FAKE="fake"
export CP4BA_INST_DB_STORAGE_SIZE="100Gi"
export CP4BA_INST_DB_REQS_CPU="2000m"
export CP4BA_INST_DB_REQS_MEMORY="2048Mi"
export CP4BA_INST_DB_LIMITS_CPU="4000m"
export CP4BA_INST_DB_LIMITS_MEMORY="8192Mi"

# new 20250121 (EDB deprecated, use external Postgresql)
export CP4BA_INST_DB_USE_EDB="false"
#export CP4BA_INST_DB_USE_EDB="true"

# new 20260223
# Postgresql ssl and tuning configuration
export CP4BA_INST_DB_POSTGRES_CONF_TEMPLATE="../templates-db-configs/postgresql_nossl.conf"
export CP4BA_INST_DB_POSTGRES_CONF_SSL_TEMPLATE="../templates-db-configs/postgresql_ssl.conf"
export CP4BA_INST_DB_POSTGRES_CONF_PGHBA_TEMPLATE="../templates-db-configs/pg_hba.conf"

# new 20260227
# Postgresql CRs for statefulset and services
export CP4BA_INST_DB_POSTGRES_CR_TEMPLATE="../templates-db-configs/pg-nossl.yaml"
export CP4BA_INST_DB_POSTGRES_CR_SSL_TEMPLATE="../templates-db-configs/pg-ssl.yaml"
export CP4BA_INST_DB_POSTGRES_SRV_CR_TEMPLATE="../templates-db-configs/pg-services.yaml"


# v25 and onward (only for EDB cluster deployment)
export CP4BA_INST_DB_IMAGE="icr.io/cpopen/edb/postgresql:16.10-5.22.0@sha256:0ec7d9cc2211ce38d9881bda9b0a1370f0420d54ff18f90495530c7cf02c0301"

export CP4BA_INST_DB_OSS_IMAGE="postgres:18.1"
export CP4BA_INST_DB_OSS_ADMIN_PASSWORD="postgres"

# DB Configurations
# number of DB servers, 1 DB instance supports an instance of BAW
export CP4BA_INST_DB_INSTANCES=1

# for each db server instance (if more than 1 replicate 4 section elements using CP4BA_INST_DB_2_, CP4BA_INST_DB_3_, etc...) 
# DB 1
# name of DB server CR
export CP4BA_INST_DB_1_CR_NAME="my-postgres-1-for-cp4ba"
export CP4BA_INST_DB_1_CR_NAME_SSL="my-postgres-1-for-cp4ba-ssl"
# template file for SQL statements
export CP4BA_INST_DB_1_TEMPLATE="../templates-sql/db-statements-ref-wfps-authoring.sql"
# DB service name 
export CP4BA_INST_DB_1_SERVICE="${CP4BA_INST_DB_1_CR_NAME}-rw"
export CP4BA_INST_DB_1_SERVICE_SSL="${CP4BA_INST_DB_1_CR_NAME}-ssl-rw"
export CP4BA_INST_DB_1_SERVICE_SSL_R="${CP4BA_INST_DB_1_CR_NAME}-ssl-r"
# DB full server name
export CP4BA_INST_DB_1_SERVER_NAME="${CP4BA_INST_DB_1_SERVICE}.${CP4BA_INST_DB_NAMESPACE}.svc.cluster.local"
export CP4BA_INST_DB_1_SERVER_NAME_SSL="${CP4BA_INST_DB_1_SERVICE_SSL}.${CP4BA_INST_DB_NAMESPACE}.svc.cluster.local"
export CP4BA_INST_DB_1_SERVER_NAME_SSL_R="${CP4BA_INST_DB_1_SERVICE_SSL_R}.${CP4BA_INST_DB_NAMESPACE}.svc.cluster.local"

#----------------------------------------------------------------------
# DB credential section, add your own if more db needed
#----------------------------------------------------------------------

# DB, usernames and passwords (do not modify for education/demo/test)
# WARNING (Restriction: You cannot use the same database user for IBM Business Automation Workflow and Workstream Services, or for other components, such as Business Automation Studio. You can use a shared database but you must use a different database user for each component.)

export CP4BA_INST_DB_BTS_USER="bts_user"
export CP4BA_INST_DB_BTS_PWD="dem0s"
export CP4BA_INST_DB_BTS_LBL="bts"

export CP4BA_INST_DB_IM_USER="im_user"
export CP4BA_INST_DB_IM_PWD="dem0s"
export CP4BA_INST_DB_IM_LBL="im"

export CP4BA_INST_DB_ZEN_USER="zen_user"
export CP4BA_INST_DB_ZEN_PWD="dem0s"
export CP4BA_INST_DB_ZEN_LBL="zen"


#++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++
# Pak Capabilities
#++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++

#----------------------------------------------------------------------
# BAW section
#----------------------------------------------------------------------

# If true create secrets only for BPM runtime, no credentials for Case db
export CP4BA_INST_BAW_BPM_ONLY=false

# If true configure also GenAI and Workflow Assistant sections
export CP4BA_INST_GENAI_ENABLED=false

#-----------------------------------------
# BAS
export CP4BA_INST_BAS_1=true
export CP4BA_INST_BAS_1_FEDERATED=false
export CP4BA_INST_BAS_1_HOST_FEDERATED_PORTAL=false
export CP4BA_INST_BAS_1_NAME="bas"
export CP4BA_INST_BAS_1_DB_HOST="${CP4BA_INST_DB_1_SERVER_NAME}" # warning: CP4BA_INST_DB_<num>
export CP4BA_INST_BAS_1_DB_PORT="${CP4BA_INST_DB_SERVER_PORT}"

export CP4BA_INST_BAS_1_DB_BAW_NAME="${CP4BA_INST_ENV_FOR_DB_PREFIX}_baw_1"

export CP4BA_INST_BAS_1_DB_SECRET="${CP4BA_INST_ENV}-${CP4BA_INST_BAS_1_NAME}-server-db-secret"
export CP4BA_INST_BAS_1_REPLICAS="1"
export CP4BA_INST_BAS_1_LIMITS_CPU="5000m"
export CP4BA_INST_BAS_1_LIMITS_MEMORY="3096Mi"
export CP4BA_INST_BAS_1_LOGS_TRACE="*=info"
export CP4BA_INST_BAS_1_MAX_POOL_SIZE="50"

# GenAI configuration (!!!!! SET YOUR OWN KEY/PRJ-ID)
export CP4BA_INST_BAS_GENAI_ENABLED="false"
export CP4BA_INST_BAS_GENAI_WX_APIKEY=""
export CP4BA_INST_BAS_GENAI_WX_PRJ_ID=""

export CP4BA_INST_BAS_GENAI_WX_AUTH_SECRET="watsonx-ai-secret"
export CP4BA_INST_BAS_GENAI_WX_USERID="marco_antonioni@it.ibm.com"
export CP4BA_INST_BAS_GENAI_WX_URL_PROVIDER="https://us-south.ml.cloud.ibm.com"

#-----------------------------------------
# WxO configuration if ENABLED=true requires CP4BA_INST_BAW_1_GENAI_ENABLED=true
export CP4BA_INST_WXO_ENABLED="false"
export CP4BA_INST_WXO_TOKEN_URL="https://iam.platform.saas.ibm.com/siusermgr/api/1.0/apikeys/token"
export CP4BA_INST_WXO_SERVICE_INSTANCE_URL="https://api.hostname/instances/tenant_id" 

#-----------------------------------------
# AI Assistants configuration (requires _GENAI_ENABLED = true)
export CP4BA_RUN_AUTHORING_AGENT="false"
export CP4BA_RUN_WORKPLACE_AGENT="false"

#----------------------------------------------------------------------
# BAW authoring
#----------------------------------------------------------------------
export CP4BA_INST_BAWAUTHORING_STORAGE_DYNAMIC_PROVISIONING="true"
export CP4BA_INST_BAWAUTHORING_STORAGE_SIZE="20Gi"

export CP4BA_INST_BAWAUTHORING_TASK_PRIORITIZATION_SERVICE_TOGGLE="false"
export CP4BA_INST_BAWAUTHORING_ALWAYS_RUN_TASK_PRIORITIZATION_SERVICE="false"

#-----------------------------------------
# DB storage, optional (do not modify for education/demo/test)
export CP4BA_INST_DB_TOS_SCHEMA_DATA="vwdata_ts"
export CP4BA_INST_DB_TOS_SCHEMA_INDEX="vwindex_ts"
export CP4BA_INST_DB_TOS_SCHEMA_BLOB="vwblob_ts"

export CP4BA_INST_DB_CONTENT_SCHEMA_DATA="contentdata_ts"
export CP4BA_INST_DB_CONTENT_SCHEMA_INDEX="contentindex_ts"
export CP4BA_INST_DB_CONTENT_SCHEMA_BLOB="contentblob_ts"

#----------------------------------------------------------------------
# Process Federation Portal section
#----------------------------------------------------------------------

#-----------------------------------------
# PFS (only 1 instance per namespace)
export CP4BA_INST_PFS=true
export CP4BA_INST_PFS_NAME="pfs-demo"
export CP4BA_INST_PFS_NAMESPACE="${CP4BA_INST_NAMESPACE}"
export CP4BA_INST_PFS_STORAGE_CLASS="${CP4BA_INST_SC_FILE}"
export CP4BA_INST_PFS_APP_VER="${CP4BA_INST_APPVER}"
export CP4BA_INST_PFS_ADMINUSER="${CP4BA_INST_PAKBA_ADMIN_USER}"
export CP4BA_INST_PFS_TOOLS_FOLDER="../../cp4ba-process-federation-server"

export CP4BA_INST_PFS_REPLICAS=2
export CP4BA_INST_PFS_RES_REQS_CPU="1000m"
export CP4BA_INST_PFS_RES_REQS_MEMORY="1024Mi"
export CP4BA_INST_PFS_RES_LIMITS_REQS_CPU="2000m"
export CP4BA_INST_PFS_RES_LIMITS_REQS_MEMORY="4Gi"

